<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  ::selection{ background:var(--primary-soft); }
  .mf-root{
    --bg:#F6F6F4; --surface:#FFFFFF; --surface-2:#EFEFEC; --border:#E2E2DE; --border-strong:#CFCFC9;
    --ink:#17181B; --ink-muted:#5E6066; --ink-subtle:#8A8C92;
    --primary:#4A40A8; --primary-hover:#3D3690; --primary-fg:#FFFFFF; --primary-soft:#ECEAF8;
    --spotlight:#E0A23C; --spotlight-soft:#FBEFD6; --spotlight-fg:#4A3411;
    --success:#3F8F6B; --danger:#C45B52; --danger-soft:#F7E4E2;
    --shadow-sm:0 1px 2px rgba(23,24,27,.05), 0 4px 14px rgba(23,24,27,.05);
    --shadow-md:0 6px 18px rgba(23,24,27,.08), 0 16px 40px rgba(23,24,27,.08);
    --ring:0 0 0 3px rgba(74,64,168,.30);
  }
  .mf-dark{
    --bg:#121316; --surface:#1A1C20; --surface-2:#22242A; --border:#2C2F36; --border-strong:#3A3E47;
    --ink:#ECECEE; --ink-muted:#A6A8AF; --ink-subtle:#7A7D85;
    --primary:#7A6FE8; --primary-hover:#8B81EE; --primary-fg:#FFFFFF; --primary-soft:#211F33;
    --spotlight:#E8B05A; --spotlight-soft:#332714; --spotlight-fg:#FBEFD6;
    --success:#5BA886; --danger:#D6766C; --danger-soft:#2E1E1C;
    --shadow-sm:0 0 0 1px var(--border); --shadow-md:0 0 0 1px var(--border-strong), 0 10px 30px rgba(0,0,0,.35);
    --ring:0 0 0 3px rgba(122,111,232,.40);
  }
  @keyframes mfFadeUp{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;} }
  @keyframes mfFadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes mfPop{ 0%{transform:scale(.4); opacity:0;} 60%{transform:scale(1.12);} 100%{transform:scale(1); opacity:1;} }
  @keyframes mfSpin{ to{transform:rotate(360deg);} }
  @keyframes mfPulse{ 0%,100%{opacity:.35;} 50%{opacity:1;} }
  @keyframes mfHalo{ from{opacity:0; transform:scale(.96);} to{opacity:1; transform:scale(1);} }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</helmet>

<div class="mf-root {{ themeClass }}" style="min-height:100vh; background:var(--bg); color:var(--ink); font-family:'IBM Plex Sans',-apple-system,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5;">

<div style="min-height:100vh; display:flex; flex-direction:column; animation:mfFadeIn .35s both;">
    <header style="padding:22px 24px;">
      <a href="./Landing.dc.html" style="display:inline-flex; align-items:center; gap:10px; text-decoration:none; color:var(--ink);">
        <img src="../assets/matchframe-logo.png" alt="MatchFrame" width="32" height="32" style="border-radius:9px; display:block;">
        <span style="font:600 18px 'IBM Plex Sans',sans-serif;">MatchFrame</span>
      </a>
    </header>
    <div style="flex:1; display:grid; place-items:center; padding:24px;">
      <div style="width:100%; max-width:400px; animation:mfFadeUp .5s both;">
        <h1 style="font:500 34px 'Outfit',sans-serif; text-align:center; margin:0 0 8px;">{{ authTitle }}</h1>
        <p style="text-align:center; color:var(--ink-muted); margin:0 0 28px; font-size:15px;">{{ authSub }}</p>
        <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; box-shadow:var(--shadow-sm);">
          <button style="width:100%; height:46px; border-radius:10px; border:1px solid var(--border-strong); background:transparent; color:var(--ink); font:600 15px 'IBM Plex Sans',sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;" style-hover="background:var(--surface-2)">
            <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.9a5 5 0 0 1-2.2 3.3v2.7h3.6c2.1-2 3.2-4.8 3.2-7.9z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.6-2.7c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.3v2.8A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M6 14.3a6.6 6.6 0 0 1 0-4.2V7.3H2.3a11 11 0 0 0 0 9.8z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .5 4.1 1.6l3.1-3.1A11 11 0 0 0 2.3 7.3L6 10.1c.9-2.6 3.2-4.7 6-4.7z"/></svg>
            Continue with Google
          </button>
          <div style="display:flex; align-items:center; gap:12px; margin:18px 0; color:var(--ink-subtle); font-size:13px;"><span style="flex:1; height:1px; background:var(--border);"></span>or<span style="flex:1; height:1px; background:var(--border);"></span></div>
          <label style="display:block; font-size:13px; font-weight:600; color:var(--ink-muted); margin-bottom:6px;">Email</label>
          <input type="email" placeholder="you@example.com" style="width:100%; height:46px; padding:0 14px; border-radius:10px; border:1px solid var(--border-strong); background:var(--bg); color:var(--ink); font:400 15px 'IBM Plex Sans',sans-serif; margin-bottom:16px;" style-focus="border-color:var(--primary); box-shadow:var(--ring); outline:none;">
          <label style="display:block; font-size:13px; font-weight:600; color:var(--ink-muted); margin-bottom:6px;">Password</label>
          <input type="password" placeholder="••••••••" style="width:100%; height:46px; padding:0 14px; border-radius:10px; border:1px solid var(--border-strong); background:var(--bg); color:var(--ink); font:400 15px 'IBM Plex Sans',sans-serif; margin-bottom:22px;" style-focus="border-color:var(--primary); box-shadow:var(--ring); outline:none;">
          <a href="./Dashboard.dc.html" style="width:100%; height:48px; border-radius:10px; background:var(--primary); color:var(--primary-fg); font:600 16px 'IBM Plex Sans',sans-serif; text-decoration:none; display:inline-flex; align-items:center; justify-content:center;" style-hover="background:var(--primary-hover)">{{ authCta }}</a>
        </div>
        <p style="text-align:center; margin:18px 0 0; font-size:14px; color:var(--ink-muted);">
          {{ authSwitchText }} <button onClick="{{ toggleAuth }}" style="background:none; border:none; padding:0; color:var(--primary); font:600 14px 'IBM Plex Sans',sans-serif; cursor:pointer;">{{ authSwitchCta }}</button>
        </p>
        <p style="text-align:center; margin:18px 0 0; font-size:13px; color:var(--ink-subtle); display:flex; align-items:center; gap:6px; justify-content:center;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          Your photos and email are kept private and encrypted.
        </p>
      </div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props){ super(props); this.state = { theme: props.defaultTheme==='dark'?'dark':'light', authMode:"signup" }; }
  componentDidMount(){ try{ const t=localStorage.getItem('mf-theme'); if(t==='light'||t==='dark') this.setState({theme:t}); }catch(e){}  try{ if(typeof location!=='undefined' && location.hash==='#login') this.setState({authMode:'login'}); }catch(e){} }
  toggleTheme(){ this.setState(s=>{ const theme=s.theme==='light'?'dark':'light'; try{localStorage.setItem('mf-theme',theme);}catch(e){} return {theme}; }); }
  renderVals(){
    const s=this.state;
    const login = s.authMode==='login';
    return { themeClass: s.theme==='dark'?'mf-dark':'', isDark:s.theme==='dark', isLight:s.theme!=='dark', themeLabel:s.theme==='dark'?'Dark':'Light', toggleTheme:()=>this.toggleTheme(),
      authTitle: login?'Welcome back':'Create your account',
      authSub: login?'Sign in to see your photo reports.':'Start your first photo test in minutes.',
      authCta: login?'Sign in':'Create account',
      authSwitchText: login?'New to MatchFrame?':'Already have an account?',
      authSwitchCta: login?'Create one':'Sign in',
      toggleAuth: ()=>this.setState(st=>({authMode: st.authMode==='login'?'signup':'login'}))
    };
  }
}
</script>
</body>
</html>
