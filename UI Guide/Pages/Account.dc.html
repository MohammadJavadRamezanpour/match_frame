<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  ::selection{ background:var(--primary-soft); }
  .mf-root{
    --bg:#F6F6F4; --surface:#FFFFFF; --surface-2:#EFEFEC; --border:#E2E2DE; --border-strong:#CFCFC9;
    --ink:#17181B; --ink-muted:#5E6066; --ink-subtle:#8A8C92;
    --primary:#4A40A8; --primary-hover:#3D3690; --primary-fg:#FFFFFF; --primary-soft:#ECEAF8;
    --spotlight:#E0A23C; --spotlight-soft:#FBEFD6; --spotlight-fg:#4A3411;
    --success:#3F8F6B; --danger:#C45B52; --danger-soft:#F7E4E2;
    --shadow-sm:0 1px 2px rgba(23,24,27,.05), 0 4px 14px rgba(23,24,27,.05);
    --shadow-md:0 6px 18px rgba(23,24,27,.08), 0 16px 40px rgba(23,24,27,.08);
    --ring:0 0 0 3px rgba(74,64,168,.30);
  }
  .mf-dark{
    --bg:#121316; --surface:#1A1C20; --surface-2:#22242A; --border:#2C2F36; --border-strong:#3A3E47;
    --ink:#ECECEE; --ink-muted:#A6A8AF; --ink-subtle:#7A7D85;
    --primary:#7A6FE8; --primary-hover:#8B81EE; --primary-fg:#FFFFFF; --primary-soft:#211F33;
    --spotlight:#E8B05A; --spotlight-soft:#332714; --spotlight-fg:#FBEFD6;
    --success:#5BA886; --danger:#D6766C; --danger-soft:#2E1E1C;
    --shadow-sm:0 0 0 1px var(--border); --shadow-md:0 0 0 1px var(--border-strong), 0 10px 30px rgba(0,0,0,.35);
    --ring:0 0 0 3px rgba(122,111,232,.40);
  }
  @keyframes mfFadeUp{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;} }
  @keyframes mfFadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes mfPop{ 0%{transform:scale(.4); opacity:0;} 60%{transform:scale(1.12);} 100%{transform:scale(1); opacity:1;} }
  @keyframes mfSpin{ to{transform:rotate(360deg);} }
  @keyframes mfPulse{ 0%,100%{opacity:.35;} 50%{opacity:1;} }
  @keyframes mfHalo{ from{opacity:0; transform:scale(.96);} to{opacity:1; transform:scale(1);} }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</helmet>

<div class="mf-root {{ themeClass }}" style="min-height:100vh; background:var(--bg); color:var(--ink); font-family:'IBM Plex Sans',-apple-system,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5;">

  <header style="position:sticky; top:0; z-index:40; background:color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter:saturate(140%) blur(10px); border-bottom:1px solid var(--border);">
    <div style="max-width:1100px; margin:0 auto; padding:12px 24px; display:flex; align-items:center; gap:16px;">
      <a href="./Dashboard.dc.html" style="display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--ink);">
        <img src="../assets/matchframe-logo.png" alt="MatchFrame" width="34" height="34" style="border-radius:9px; display:block;">
        <span style="font:600 18px 'IBM Plex Sans',sans-serif; letter-spacing:-.01em;">MatchFrame</span>
      </a>
      <nav style="margin-left:8px; display:flex; gap:4px;">
        <a href="./Dashboard.dc.html" style="height:36px; padding:0 14px; display:inline-flex; align-items:center; border-radius:8px; text-decoration:none; background:transparent; color:var(--ink-muted); font:600 14px 'IBM Plex Sans',sans-serif;">Dashboard</a>
      </nav>
      <div style="flex:1;"></div>
      <div style="display:flex; align-items:center; gap:6px; padding:6px 11px; border-radius:999px; background:var(--surface-2); color:var(--ink-subtle); font-size:13px; font-weight:500;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        Private
      </div>
      <button onClick="{{ toggleTheme }}" aria-label="Toggle theme" style="width:40px; height:40px; display:grid; place-items:center; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer;" style-hover="background:var(--surface-2)" style-focus="box-shadow:var(--ring); outline:none;">
        <sc-if value="{{ isDark }}" hint-placeholder-val="{{ false }}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg></sc-if>
        <sc-if value="{{ isLight }}" hint-placeholder-val="{{ true }}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.5A8.5 8.5 0 1 1 11.5 3a6.5 6.5 0 0 0 9.5 9.5z"/></svg></sc-if>
      </button>
      <a href="./Account.dc.html" aria-label="Account" style="width:40px; height:40px; border-radius:999px; border:1px solid var(--border); background:var(--primary-soft); color:var(--primary); font:600 14px 'IBM Plex Sans',sans-serif; display:grid; place-items:center; text-decoration:none;">AR</a>
    </div>
  </header>

<main style="max-width:680px; margin:0 auto; padding:40px 24px 110px; animation:mfFadeUp .45s both;">
    <h1 style="font:500 34px 'Outfit',sans-serif; margin:0 0 28px;">Account</h1>

    <section style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:var(--shadow-sm); margin-bottom:18px;">
      <h2 style="font:600 17px 'IBM Plex Sans',sans-serif; margin:0 0 16px;">Profile</h2>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);"><span style="color:var(--ink-muted); font-size:14px;">Email</span><span style="font-size:15px;">ar.daneshvar@example.com</span></div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0;"><span style="color:var(--ink-muted); font-size:14px;">Appearance</span>
        <button onClick="{{ toggleTheme }}" style="display:inline-flex; align-items:center; gap:8px; padding:7px 13px; border-radius:8px; border:1px solid var(--border-strong); background:var(--bg); color:var(--ink); font:600 13px 'IBM Plex Sans',sans-serif; cursor:pointer;">{{ themeLabel }}</button>
      </div>
    </section>

    <section style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:var(--shadow-sm); margin-bottom:18px;">
      <h2 style="font:600 17px 'IBM Plex Sans',sans-serif; margin:0 0 16px;">Payment history</h2>
      <sc-for list="{{ payments }}" as="pay" hint-placeholder-count="3">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border);">
          <div><div style="font-size:15px; font-weight:500;">{{ pay.name }}</div><div style="font-size:12px; color:var(--ink-subtle); font-family:'Geist Mono',monospace;">{{ pay.date }}</div></div>
          <span style="font:500 15px 'Geist Mono',monospace;">{{ pay.amount }}</span>
        </div>
      </sc-for>
    </section>

    <section style="background:var(--surface); border:1px solid var(--danger); border-radius:16px; padding:24px;">
      <h2 style="font:600 17px 'IBM Plex Sans',sans-serif; margin:0 0 6px; color:var(--danger);">Delete account &amp; data</h2>
      <p style="margin:0 0 16px; font-size:14px; color:var(--ink-muted); text-wrap:pretty;">This permanently removes your photos, reports, and account. We’ll ask you to confirm once more.</p>
      <button style="height:44px; padding:0 18px; border-radius:10px; border:1px solid var(--danger); background:var(--danger-soft); color:var(--danger); font:600 14px 'IBM Plex Sans',sans-serif; cursor:pointer;" style-hover="opacity:.85">Delete everything</button>
    </section>
  </main>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props){ super(props); this.state = { theme: props.defaultTheme==='dark'?'dark':'light' }; }
  componentDidMount(){ try{ const t=localStorage.getItem('mf-theme'); if(t==='light'||t==='dark') this.setState({theme:t}); }catch(e){}  }
  toggleTheme(){ this.setState(s=>{ const theme=s.theme==='light'?'dark':'light'; try{localStorage.setItem('mf-theme',theme);}catch(e){} return {theme}; }); }
  renderVals(){
    const s=this.state;
    const payments=[
      { name:'Photo test · 6 photos', date:'Jun 14, 2026', amount:'$12.00' },
      { name:'Photo test · 8 photos', date:'Jun 16, 2026', amount:'$12.00' },
      { name:'Photo test · 3 photos', date:'Jun 10, 2026', amount:'$12.00' }
    ];
    return { themeClass: s.theme==='dark'?'mf-dark':'', isDark:s.theme==='dark', isLight:s.theme!=='dark', themeLabel:s.theme==='dark'?'Dark':'Light', toggleTheme:()=>this.toggleTheme(), payments };
  }
}
</script>
</body>
</html>
